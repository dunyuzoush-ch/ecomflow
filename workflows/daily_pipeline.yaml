## 质量门禁 (Quality Gates)

| 指标 | 最低要求 | 严重阈值 |
|------|----------|----------|
| 趋势产品 | ≥20个 | <10 |
| 发布产品 | ≥10个 | <5 |
| SEO文章 | ≥5篇 | <2 |
| 社媒内容 | ≥30条 | <10 |
| 测试广告 | ≥10个 | <5 |
| 平均ROAS | ≥2.0 | <1.5 |

---

## 错误处理

```yaml
error_handling:
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay: 1000ms
    
  alerts:
    - on_failure: sendSlackNotification
    - on_critical: sendEmail
    - on_blocking: stop_pipeline
    
  fallback:
    - if shopify_fail: queue_for_retry
    - if ads_fail: continue_without_ads
    - if wordpress_fail: save_locally
```

